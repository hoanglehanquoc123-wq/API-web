<!doctype html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Thị Trường</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="api1.css">
    <style>
        body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Chỉ hiện thanh cuộn cho vùng Main */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251, 191, 36, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="gradient-bg text-white h-full">

    <header class="py-4 px-6 border-b border-white/10 glass-card z-50 shrink-0">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 gold-gradient rounded-xl flex items-center justify-center pulse-glow">
                    <i data-lucide="trending-up" class="w-6 h-6 text-gray-900"></i>
                </div>
                <h1 class="text-xl font-bold">Thông Tin Thị Trường</h1>
            </div>
            <nav class="flex gap-2">
                <button onclick="showPage('home')" id="nav-home" class="nav-item active px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <i data-lucide="home" class="w-4 h-4"></i> <span class="hidden sm:inline">Trang chủ</span>
                </button>
                <button onclick="showPage('gold')" id="nav-gold" class="nav-item px-4 py-2 rounded-lg font-medium flex items-center gap-2 text-gray-300">
                    <i data-lucide="coins" class="w-4 h-4"></i> <span class="hidden sm:inline">Giá vàng</span>
                </button>
                <button onclick="showPage('news')" id="nav-news" class="nav-item px-4 py-2 rounded-lg font-medium flex items-center gap-2 text-gray-300">
                    <i data-lucide="newspaper" class="w-4 h-4"></i> <span class="hidden sm:inline">Tin tức</span>
                </button>
                <button onclick="showPage('weather')" id="nav-weather" class="nav-item px-4 py-2 rounded-lg font-medium flex items-center gap-2 text-gray-300">
                    <i data-lucide="cloud-sun" class="w-4 h-4"></i> <span class="hidden sm:inline">Thời tiết</span>
                </button>
            </nav>
        </div>
    </header>

    <section id="page-home" class="page flex-1 flex items-center justify-center p-6">
        <div class="glass-card rounded-3xl p-10 max-w-2xl w-full text-center card-hover">
            <div class="mx-auto mb-6 float-animation">
                <img id="home-avatar" src="skirk-genshin-impact-4k-wallpaper.jpg" alt="Avatar" 
                     class="w-24 h-24 rounded-full border-4 border-amber-400 object-cover shadow-2xl mx-auto">
            </div>
            <h2 class="text-3xl font-bold mb-2 text-white">Nguyễn Lê Hoàng</h2>
            <h3 class="text-4xl font-bold gold-gradient bg-clip-text text-transparent mb-6">Chào bạn đến với Market API</h3>
            <p id="intro-text" class="text-gray-300 text-lg leading-relaxed mb-8">Cập nhật giá vàng, dầu thô và thời tiết 24/7 từ các nguồn dữ liệu chính thống.</p>
            <div class="flex justify-center gap-4 flex-wrap text-amber-400 text-sm">
                <span class="flex items-center gap-1"><i data-lucide="check-circle" class="w-4 h-4"></i> Chính xác</span>
                <span class="flex items-center gap-1"><i data-lucide="check-circle" class="w-4 h-4"></i> Tốc độ</span>
                <span class="flex items-center gap-1"><i data-lucide="check-circle" class="w-4 h-4"></i> Miễn phí</span>
            </div>
        </div>
    </section>

    <main id="main-content" class="flex-1 overflow-y-auto custom-scrollbar p-6 hidden">
        <div class="max-w-6xl mx-auto">
            
            <section id="page-gold" class="page hidden">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="coins" class="text-amber-400"></i> Thị trường Vàng
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-12">
                    </div>
            </section>

            <section id="page-news" class="page hidden">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="newspaper" class="text-amber-400"></i> Tin Tức
                </h2>
                <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-12">
                    </div>
            </section>

            <section id="page-weather" class="page hidden">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="cloud-sun" class="text-sky-400"></i> Thời tiết các Nước
                </h2>
                <div id="weather-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-12">
                    </div>
            </section>

        </div>
    </main>

    <footer class="py-4 px-6 border-t border-white/10 glass-card text-center text-gray-500 text-xs shrink-0">
        © 2026 Thông Tin Thị Trường - Nguyễn Lê Hoàng
    </footer>

    <script>
        function showPage(pageId) {
            // 1. Ẩn tất cả các section (bao gồm cả Home)
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            
            // 2. Ẩn/Hiện vùng cuộn Main
            const mainContent = document.getElementById('main-content');
            const homePage = document.getElementById('page-home');
            
            if (pageId === 'home') {
                homePage.classList.remove('hidden');
                mainContent.classList.add('hidden');
            } else {
                homePage.classList.add('hidden');
                mainContent.classList.remove('hidden');
                document.getElementById('page-' + pageId).classList.remove('hidden');
                mainContent.scrollTop = 0; // Reset cuộn về đầu
            }

            // 3. Update nút menu active
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active', 'text-white');
                btn.classList.add('text-gray-300');
            });
            document.getElementById('nav-' + pageId).classList.add('active', 'text-white');
        }
    </script>
</body>
</html>
