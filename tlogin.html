  <style>
        * { font-family: 'Be Vietnam Pro', sans-serif; box-sizing: border-box; }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
        }
        
        .gold-gradient {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-item.active { 
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); 
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        
        .card-hover { transition: all 0.4s ease; }
        .card-hover:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(251, 191, 36, 0.2);
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
            50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.3); }
        }
        .pulse-glow { animation: pulse-glow 3s infinite; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .float-animation { animation: float 4s ease-in-out infinite; }
        
        .page { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden { display: none; }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.1);
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(251, 191, 36, 0.3);
        }
        
        .divider {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .animated-border {
            position: relative;
        }
        .animated-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #fbbf24, #f59e0b, #1e1b4b, #fbbf24);
            background-size: 400% 400%;
            animation: gradient-shift 8s ease infinite;
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .animated-border:hover::before {
            opacity: 1;
        }
    </style>

       <div class="relative"><i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i> <input type="password" id="register-password" placeholder="Tối thiểu 8 ký tự" class="input-field w-full pl-12 pr-12 py-3.5 rounded-xl text-white placeholder-gray-500"> <button type="button" id="toggle-register-pass" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors"> <i data-lucide="eye" class="w-5 h-5"></i> </button>

  <script>
        // Default configuration
        const defaultConfig = {
            brand_name: 'ColorAPI',
            login_title: 'Chào mừng trở lại',
            register_title: 'Tạo tài khoản mới',
            primary_color: '#fbbf24',
            secondary_color: '#f59e0b',
            background_color: '#0f172a',
            text_color: '#ffffff',
            muted_color: '#9ca3af'
        };
        
        let config = { ...defaultConfig };
        
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Tab switching
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginPage = document.getElementById('login-page');
        const registerPage = document.getElementById('register-page');
        
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginPage.classList.remove('hidden');
            registerPage.classList.add('hidden');
        });
        
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerPage.classList.remove('hidden');
            loginPage.classList.add('hidden');
        });
        
        // Password visibility toggle
        function setupPasswordToggle(toggleId, inputId) {
            const toggle = document.getElementById(toggleId);
            const input = document.getElementById(inputId);
            
            toggle.addEventListener('click', () => {
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                const icon = toggle.querySelector('i');
                icon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
                lucide.createIcons();
            });
        }
        
        setupPasswordToggle('toggle-login-pass', 'login-password');
        setupPasswordToggle('toggle-register-pass', 'register-password');
        
        // Password strength checker
        const registerPassword = document.getElementById('register-password');
        const strengthBars = [
            document.getElementById('strength-1'),
            document.getElementById('strength-2'),
            document.getElementById('strength-3'),
            document.getElementById('strength-4')
        ];
        const strengthText = document.getElementById('strength-text');
        
        registerPassword.addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
            const texts = ['Yếu', 'Trung bình', 'Khá', 'Mạnh'];
            
            strengthBars.forEach((bar, index) => {
                if (index < strength) {
                    bar.style.background = colors[strength - 1];
                } else {
                    bar.style.background = '#374151';
                }
            });
            
            if (password.length > 0) {
                strengthText.textContent = texts[strength - 1] || 'Quá yếu';
                strengthText.style.color = colors[strength - 1] || '#ef4444';
            } else {
                strengthText.textContent = '';
            }
        });
        
        // Form submissions
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (email && password) {
                document.getElementById('login-success').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('login-success').classList.add('hidden');
                }, 3000);
            }
        });
        
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const terms = document.getElementById('terms-checkbox').checked;
            
            if (name && email && password && confirm && terms) {
                if (password === confirm) {
                    document.getElementById('register-success').classList.remove('hidden');
                    setTimeout(() => {
                        document.getElementById('register-success').classList.add('hidden');
                    }, 3000);
                }
            }
        });
        
        // Element SDK integration
        async function onConfigChange(cfg) {
            document.getElementById('brand-name').textContent = cfg.brand_name || defaultConfig.brand_name;
            document.getElementById('login-title').textContent = cfg.login_title || defaultConfig.login_title;
            document.getElementById('register-title').textContent = cfg.register_title || defaultConfig.register_title;
        }
        
        function mapToCapabilities(cfg) {
            return {
                recolorables: [
                    {
                        get: () => cfg.background_color || defaultConfig.background_color,
                        set: (value) => {
                            cfg.background_color = value;
                            window.elementSdk.setConfig({ background_color: value });
                        }
                    },
                    {
                        get: () => cfg.primary_color || defaultConfig.primary_color,
                        set: (value) => {
                            cfg.primary_color = value;
                            window.elementSdk.setConfig({ primary_color: value });
                        }
                    },
                    {
                        get: () => cfg.text_color || defaultConfig.text_color,
                        set: (value) => {
                            cfg.text_color = value;
                            window.elementSdk.setConfig({ text_color: value });
                        }
                    }
                ],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            };
        }
        
        function mapToEditPanelValues(cfg) {
            return new Map([
                ['brand_name', cfg.brand_name || defaultConfig.brand_name],
                ['login_title', cfg.login_title || defaultConfig.login_title],
                ['register_title', cfg.register_title || defaultConfig.register_title]
            ]);
        }
        
        // Initialize SDK
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities,
                mapToEditPanelValues
            });
        }
    </script>
