<!doctype html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color API - Đăng nhập & Đăng ký</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    
    <link rel="stylesheet" href="login1.css">
</head>
<body class="h-full gradient-bg">
    <div class="min-h-full w-full flex items-center justify-center p-4 overflow-auto">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl gold-gradient pulse-glow mb-4">
                    <i data-lucide="palette" class="w-8 h-8 text-slate-900"></i>
                </div>
                <h1 id="brand-name" class="text-2xl font-bold text-white">API WEBSITE</h1>
                <p class="text-gray-400 text-sm mt-1">API Thông tin Thị trường</p>
            </div>

            <div class="flex gap-2 mb-6 p-1.5 glass-card rounded-xl">
                <button id="login-tab" class="nav-item active flex-1 py-3 px-4 rounded-lg font-medium text-sm flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i> Đăng nhập
                </button>
                <button id="register-tab" class="nav-item flex-1 py-3 px-4 rounded-lg font-medium text-sm text-gray-400 hover:text-white flex items-center justify-center gap-2">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Đăng ký
                </button>
            </div>

            <div id="login-page" class="page glass-card rounded-2xl p-8 animated-border">
                <h2 id="login-title" class="text-xl font-semibold text-white mb-2">Chào mừng trở lại</h2>
                <p class="text-gray-400 text-sm mb-6">Đăng nhập để tiếp tục sử dụng dịch vụ</p>
                <form id="login-form" class="space-y-5">
                    <div>
                        <label for="login-email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                            <input type="email" id="login-email" placeholder="email@example.com" class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-gray-500">
                        </div>
                    </div>
                    <div>
                        <label for="login-password" class="block text-sm font-medium text-gray-300 mb-2">Mật khẩu</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                            <input type="password" id="login-password" placeholder="••••••••" class="input-field w-full pl-12 pr-12 py-3.5 rounded-xl text-white placeholder-gray-500">
                            <button type="button" id="toggle-login-pass" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-gray-600 bg-transparent text-amber-500 focus:ring-amber-500 focus:ring-offset-0">
                            <span class="text-sm text-gray-400">Ghi nhớ đăng nhập</span>
                        </label>
                        <a href="#" class="text-sm text-amber-400 hover:text-amber-300 transition-colors">Quên mật khẩu?</a>
                    </div>
                    <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-slate-900 flex items-center justify-center gap-2">
                        <span>Đăng nhập</span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </form>
                
                <div class="relative my-6">
                    <div class="divider h-px w-full"></div>
                    <span class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#0f172a] px-4 text-sm text-gray-500">hoặc</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="btn-secondary py-3 rounded-xl flex items-center justify-center gap-2 text-gray-300">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                        </svg> Google
                    </button>
                    <button class="btn-secondary py-3 rounded-xl flex items-center justify-center gap-2 text-gray-300">
                        <i data-lucide="github" class="w-5 h-5"></i> GitHub
                    </button>
                </div>

                <div id="login-success" class="hidden mt-4 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/30">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center">
                            <i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>
                        </div>
                        <p class="text-emerald-400 text-sm font-medium">Đăng nhập thành công!</p>
                    </div>
                </div>
            </div>

            <div id="register-page" class="page glass-card rounded-2xl p-8 animated-border hidden">
                <h2 id="register-title" class="text-xl font-semibold text-white mb-2">Tạo tài khoản mới</h2>
                <p class="text-gray-400 text-sm mb-6">Đăng ký để bắt đầu sử dụng API</p>
                <form id="register-form" class="space-y-5">
                    <div>
                        <label for="register-name" class="block text-sm font-medium text-gray-300 mb-2">Họ và tên</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                            <input type="text" id="register-name" placeholder="Nguyễn Văn A" class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-gray-500">
                        </div>
                    </div>
                    <div>
                        <label for="register-email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                            <input type="email" id="register-email" placeholder="email@example.com" class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-gray-500">
                        </div>
                    </div>
                    <div>
                        <label for="register-password" class="block text-sm font-medium text-gray-300 mb-2">Mật khẩu</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                            <input type="password" id="register-password" placeholder="Tối thiểu 8 ký tự" class="input-field w-full pl-12 pr-12 py-3.5 rounded-xl text-white placeholder-gray-500">
                            <button type="button" id="toggle-register-pass" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div class="mt-2 flex gap-1">
                            <div id="strength-1" class="h-1 flex-1 rounded-full bg-gray-700"></div>
                            <div id="strength-2" class="h-1 flex-1 rounded-full bg-gray-700"></div>
                            <div id="strength-3" class="h-1 flex-1 rounded-full bg-gray-700"></div>
                            <div id="strength-4" class="h-1 flex-1 rounded-full bg-gray-700"></div>
                        </div>
                        <p id="strength-text" class="text-xs text-gray-500 mt-1"></p>
                    </div>
                    <div>
                        <label for="register-confirm" class="block text-sm font-medium text-gray-300 mb-2">Xác nhận mật khẩu</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                            <input type="password" id="register-confirm" placeholder="Nhập lại mật khẩu" class="input-field w-full pl-12 pr-4 py-3.5 rounded-xl text-white placeholder-gray-500">
                        </div>
                    </div>
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" id="terms-checkbox" class="w-4 h-4 mt-0.5 rounded border-gray-600 bg-transparent text-amber-500 focus:ring-amber-500 focus:ring-offset-0">
                        <span class="text-sm text-gray-400">Tôi đồng ý với <a href="#" class="text-amber-400 hover:text-amber-300">Điều khoản dịch vụ</a> và <a href="#" class="text-amber-400 hover:text-amber-300">Chính sách bảo mật</a></span>
                    </label>
                    <button type="submit" class="btn-primary w-full py-3.5 rounded-xl font-semibold text-slate-900 flex items-center justify-center gap-2">
                        <span>Tạo tài khoản</span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </form>

                <div class="relative my-6">
                    <div class="divider h-px w-full"></div>
                    <span class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#0f172a] px-4 text-sm text-gray-500">hoặc</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="btn-secondary py-3 rounded-xl flex items-center justify-center gap-2 text-gray-300">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                        </svg> Google
                    </button>
                    <button class="btn-secondary py-3 rounded-xl flex items-center justify-center gap-2 text-gray-300">
                        <i data-lucide="github" class="w-5 h-5"></i> GitHub
                    </button>
                </div>

                <div id="register-success" class="hidden mt-4 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/30">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center">
                            <i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>
                        </div>
                        <p class="text-emerald-400 text-sm font-medium">Đăng ký thành công! Kiểm tra email để xác thực.</p>
                    </div>
                </div>
            </div>

            <p class="text-center text-gray-500 text-sm mt-6">© 2024 ColorAPI. All rights reserved.</p>
        </div>
    </div>
    
    <script src="login1.js"></script>
</body>
</html>
